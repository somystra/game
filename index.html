<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>VoxelCraft Online</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#1a1a2e; overflow:hidden; font-family:'Segoe UI',sans-serif; color:#fff; }
#c { display:block; width:100vw; height:100vh; position:fixed; top:0; left:0; }
#crosshair { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); width:20px; height:20px; pointer-events:none; z-index:10; }
#crosshair::before,#crosshair::after { content:''; position:absolute; background:#fff; }
#crosshair::before { width:2px; height:100%; left:50%; transform:translateX(-50%); }
#crosshair::after  { height:2px; width:100%; top:50%; transform:translateY(-50%); }
#hud { position:fixed; bottom:0; left:0; right:0; display:flex; justify-content:center; padding-bottom:12px; pointer-events:none; z-index:10; }
#hotbar { display:flex; gap:3px; }
.slot { width:50px; height:50px; border:2px solid rgba(255,255,255,0.3); border-radius:5px; background:rgba(0,0,0,0.6); display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; }
.slot.active { border-color:#fff; }
.slot-icon { width:28px; height:28px; border-radius:3px; margin-bottom:1px; }
.slot-label { font-size:8px; color:rgba(255,255,255,0.6); }
#info { position:fixed; top:8px; left:8px; font-size:12px; background:rgba(0,0,0,0.6); padding:6px 10px; border-radius:6px; line-height:1.8; z-index:10; }
#plist { position:fixed; top:8px; right:8px; font-size:12px; background:rgba(0,0,0,0.6); padding:6px 10px; border-radius:6px; min-width:130px; z-index:10; }
#plist h4 { color:#00ffb4; font-size:11px; margin-bottom:3px; }
#chatbox { position:fixed; bottom:72px; left:10px; width:260px; z-index:10; }
#chatmsgs { background:rgba(0,0,0,0.6); border-radius:5px; padding:5px 8px; max-height:120px; overflow-y:auto; font-size:11px; margin-bottom:3px; }
#chatinput { width:100%; background:rgba(0,0,0,0.8); border:1px solid rgba(255,255,255,0.3); color:#fff; padding:5px 8px; border-radius:5px; font-size:12px; display:none; outline:none; }

/* OVERLAY */
#overlay { position:fixed; inset:0; background:linear-gradient(135deg,#0f0c29,#302b63,#24243e); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:200; gap:12px; }
#overlay h1 { font-size:42px; color:#5dfc5d; text-shadow:0 0 30px #5dfc5d,0 0 60px #5dfc5d33; letter-spacing:3px; margin-bottom:4px; }
#overlay p { color:#aaa; font-size:13px; margin-bottom:8px; }
.mbtn { padding:13px 40px; font-size:15px; border-radius:10px; border:none; cursor:pointer; font-family:'Segoe UI'; font-weight:700; letter-spacing:.5px; transition:all 0.2s; min-width:240px; }
.mbtn:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(0,0,0,0.4); }
#gbtn { background:linear-gradient(135deg,#4285f4,#1a73e8); color:#fff; }
#abtn { background:linear-gradient(135deg,#5dfc5d,#28a428); color:#000; }
#errmsg { color:#ff6b6b; font-size:12px; min-height:16px; text-align:center; }
#statusmsg { color:#5dfc5d; font-size:13px; min-height:16px; }

/* PAUSE */
#pause { position:fixed; inset:0; background:rgba(0,0,0,0.8); display:none; flex-direction:column; align-items:center; justify-content:center; z-index:150; gap:14px; }
#pause h2 { font-size:30px; }

/* DEBUG */
#debug { position:fixed; bottom:10px; right:10px; font-size:11px; color:#888; background:rgba(0,0,0,0.5); padding:4px 8px; border-radius:4px; z-index:20; max-width:300px; word-break:break-all; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="crosshair"></div>
<div id="hud"><div id="hotbar"></div></div>
<div id="info">
  <div id="posinfo">X:0 Y:0 Z:0</div>
  <div id="fpsinfo">FPS: —</div>
  <div id="blkinfo">Blok: Grass</div>
  <div style="color:#777;font-size:10px;">T=Chat | ESC=Pauza | 1-9=Blok</div>
</div>
<div id="plist"><h4>👥 Online</h4><div id="pnames"></div></div>
<div id="chatbox">
  <div id="chatmsgs"></div>
  <input id="chatinput" placeholder="Xabar... (Enter)" />
</div>
<div id="debug">Yuklanmoqda...</div>

<div id="overlay">
  <h1>⛏ VoxelCraft</h1>
  <p>Online multiplayer voxel o'yini</p>
  <div id="statusmsg"></div>
  <button class="mbtn" id="gbtn">🔑 Google bilan kirish</button>
  <button class="mbtn" id="abtn">👤 Mehmon sifatida o'ynash</button>
  <div id="errmsg"></div>
</div>

<div id="pause">
  <h2>⏸ Pauza</h2>
  <button class="mbtn" style="background:#5dfc5d;color:#000;" id="resumebtn">▶ Davom ettirish</button>
  <button class="mbtn" style="background:#e74c3c;color:#fff;margin-top:6px;" onclick="location.reload()">🚪 Chiqish</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script type="module">
import { initializeApp }      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithPopup, signInAnonymously, GoogleAuthProvider, onAuthStateChanged }
                               from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, set, get, onValue, remove, onDisconnect, serverTimestamp, push }
                               from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const dbg = s => { document.getElementById('debug').textContent = s; console.log(s); };

dbg('Firebase init...');
let fbApp, auth, db;
try {
  fbApp = initializeApp({
    apiKey:"AIzaSyCrJYqb9ClyUygAfJPoTqXmq5w2TGAvAkY",
    authDomain:"mingbulak-ijara-32bea.firebaseapp.com",
    databaseURL:"https://mingbulak-ijara-32bea-default-rtdb.firebaseio.com",
    projectId:"mingbulak-ijara-32bea",
    storageBucket:"mingbulak-ijara-32bea.firebasestorage.app",
    messagingSenderId:"1057060835809",
    appId:"1:1057060835809:web:c267dc2666ce262d45c2a0"
  });
  auth = getAuth(fbApp);
  db   = getDatabase(fbApp);
  dbg('Firebase OK ✅');
} catch(e) {
  dbg('Firebase xato: '+e.message);
}

// Blocks
const BLOCKS = {
  1:{name:'Grass', color:0x4CAF50},
  2:{name:'Dirt',  color:0x795548},
  3:{name:'Stone', color:0x9E9E9E},
  4:{name:'Wood',  color:0x8D6E63},
  5:{name:'Leaves',color:0x388E3C},
  6:{name:'Sand',  color:0xF9A825},
  7:{name:'Water', color:0x1565C0, tr:true},
  8:{name:'Coal',  color:0x424242},
  9:{name:'Iron',  color:0xBCAAA4},
};
const HB=[1,2,3,4,5,6,7,8,9];

// Three.js
const cv=document.getElementById('c');
const rdr=new THREE.WebGLRenderer({canvas:cv,antialias:true});
rdr.setSize(innerWidth,innerHeight);
rdr.shadowMap.enabled=true;
const sc=new THREE.Scene();
sc.background=new THREE.Color(0x87CEEB);
sc.fog=new THREE.Fog(0x87CEEB,35,85);
const cam=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,200);
cam.position.set(0,22,0);
const sun=new THREE.DirectionalLight(0xffffff,1.3);
sun.position.set(40,70,20); sun.castShadow=true;
sun.shadow.camera.left=-50; sun.shadow.camera.right=50;
sun.shadow.camera.top=50; sun.shadow.camera.bottom=-50;
sun.shadow.camera.far=150; sun.shadow.mapSize.set(1024,1024);
sc.add(sun);
sc.add(new THREE.AmbientLight(0xaaccff,0.9));
sc.add(new THREE.HemisphereLight(0x87CEEB,0x4a7c4e,0.4));

const BG=new THREE.BoxGeometry(1,1,1);
const MC={};
function gm(c,tr=false){
  const k=c+'_'+tr;
  if(!MC[k]) MC[k]=new THREE.MeshLambertMaterial({color:c,transparent:tr,opacity:tr?0.6:1});
  return MC[k];
}

const WM={}, WD={};
const bk=(x,y,z)=>`${Math.round(x)},${Math.round(y)},${Math.round(z)}`;

function addB(x,y,z,id,sv=false){
  const k=bk(x,y,z); if(WM[k]) return;
  const b=BLOCKS[id]; if(!b) return;
  const m=new THREE.Mesh(BG,gm(b.color,!!b.tr));
  m.position.set(x,y,z); m.castShadow=!b.tr; m.receiveShadow=true;
  m.userData={id,bx:x,by:y,bz:z};
  sc.add(m); WM[k]=m; WD[k]=id;
  if(sv) set(ref(db,`vc/w/${k}`),id);
}
function delB(x,y,z,sv=false){
  const k=bk(x,y,z); if(!WM[k]) return;
  sc.remove(WM[k]); delete WM[k]; delete WD[k];
  if(sv) remove(ref(db,`vc/w/${k}`));
}

function noise(x,z){
  return Math.sin(x*0.08+1.3)*Math.cos(z*0.08+2.1)*3
        +Math.sin(x*0.17+0.5)*Math.cos(z*0.14+1.2)*1.5
        +Math.sin(x*0.03+3.1)*Math.cos(z*0.025+0.8)*5;
}
function genWorld(){
  dbg('Dunyo yaratilmoqda...');
  for(let x=-16;x<16;x++) for(let z=-16;z<16;z++){
    const h=Math.round(8+noise(x,z));
    for(let y=0;y<=h;y++){
      let id;
      if(y===h) id=(h<7)?6:1;
      else if(y>=h-3) id=2;
      else id=(Math.random()<0.06)?(Math.random()<0.5?8:9):3;
      addB(x,y,z,id);
    }
    if(h<6) for(let wy=h+1;wy<=6;wy++) addB(x,wy,z,7);
    if(h>=7&&Math.random()<0.04){
      const th=4+Math.floor(Math.random()*2);
      for(let ty=h+1;ty<h+1+th;ty++) addB(x,ty,z,4);
      for(let lx=-2;lx<=2;lx++) for(let lz=-2;lz<=2;lz++) for(let ly=0;ly<2;ly++)
        if(Math.abs(lx)+Math.abs(lz)<=3) addB(x+lx,h+1+th+ly,z+lz,5);
    }
  }
  dbg('Dunyo tayyor ✅');
}

// Hotbar
let sel=0;
HB.forEach((id,i)=>{
  const s=document.createElement('div');
  s.className='slot'+(i===0?' active':''); s.id='sl'+i;
  s.innerHTML=`<div class="slot-icon" style="background:#${BLOCKS[id].color.toString(16).padStart(6,'0')}"></div><div class="slot-label">${BLOCKS[id].name}</div>`;
  s.onclick=()=>{sel=i;uhb();};
  document.getElementById('hotbar').appendChild(s);
});
function uhb(){HB.forEach((_,i)=>document.getElementById('sl'+i).className='slot'+(i===sel?' active':''));document.getElementById('blkinfo').textContent='Blok: '+BLOCKS[HB[sel]].name;}

// Controls
const KY={};
let chat=false,pause=false,active=false;
document.addEventListener('keydown',e=>{
  KY[e.code]=true;
  if(chat){ if(e.code==='Enter'){e.preventDefault();sendChat();} if(e.code==='Escape'){e.preventDefault();closeChat();} return; }
  if(e.code==='KeyT'&&active){e.preventDefault();openChat();}
  if(e.code==='Escape'&&active) tPause();
  const n=parseInt(e.key); if(!isNaN(n)&&n>=1&&n<=9){sel=n-1;uhb();}
});
document.addEventListener('keyup',e=>KY[e.code]=false);
document.addEventListener('wheel',e=>{sel=(sel+(e.deltaY>0?1:-1)+9)%9;uhb();},{passive:true});

let locked=false,yaw=0,pitch=0;
cv.addEventListener('click',()=>{ if(active&&!pause&&!chat) cv.requestPointerLock(); });
document.addEventListener('pointerlockchange',()=>{ locked=document.pointerLockElement===cv; });
document.addEventListener('mousemove',e=>{
  if(!locked||chat) return;
  yaw-=e.movementX*0.002;
  pitch=Math.max(-1.55,Math.min(1.55,pitch-e.movementY*0.002));
});

const ray=new THREE.Raycaster(); ray.far=6;
document.addEventListener('mousedown',e=>{
  if(!locked||chat||pause) return;
  ray.setFromCamera(new THREE.Vector2(0,0),cam);
  const hits=ray.intersectObjects(Object.values(WM));
  if(!hits.length) return;
  const {bx,by,bz}=hits[0].object.userData;
  if(e.button===0){ delB(bx,by,bz,true); }
  else if(e.button===2){
    const n=hits[0].face.normal;
    const nx=Math.round(bx+n.x),ny=Math.round(by+n.y),nz=Math.round(bz+n.z);
    if(Math.abs(nx-px)<0.9&&Math.abs(ny-py)<1.6&&Math.abs(nz-pz)<0.9) return;
    addB(nx,ny,nz,HB[sel],true);
  }
});
cv.addEventListener('contextmenu',e=>e.preventDefault());

// Physics
let px=0,py=22,pz=0;
const vel=new THREE.Vector3();
let gnd=false;
const isB=(x,y,z)=>{ const id=WD[bk(Math.round(x),Math.round(y),Math.round(z))]; return id&&id!==7; };
function phys(dt){
  const d=new THREE.Vector3(-Math.sin(yaw),0,-Math.cos(yaw));
  const r=new THREE.Vector3(-Math.cos(yaw),0,Math.sin(yaw));
  const mv=new THREE.Vector3();
  if(KY['KeyW']||KY['ArrowUp']) mv.add(d);
  if(KY['KeyS']||KY['ArrowDown']) mv.sub(d);
  if(KY['KeyA']||KY['ArrowLeft']) mv.sub(r);
  if(KY['KeyD']||KY['ArrowRight']) mv.add(r);
  if(mv.length()>0) mv.normalize().multiplyScalar(6);
  vel.x=mv.x; vel.z=mv.z; vel.y+=(-28)*dt;
  if(KY['Space']&&gnd){vel.y=10;gnd=false;}
  px+=vel.x*dt; if(isB(px,py,pz)||isB(px,py-0.9,pz)){px-=vel.x*dt;vel.x=0;}
  pz+=vel.z*dt; if(isB(px,py,pz)||isB(px,py-0.9,pz)){pz-=vel.z*dt;vel.z=0;}
  py+=vel.y*dt; gnd=false;
  if(vel.y<0&&isB(px,py-1.8,pz)){py=Math.round(py-1.8)+1.81;vel.y=0;gnd=true;}
  if(vel.y>0&&isB(px,py,pz)){vel.y=0;}
  cam.position.set(px,py,pz);
  cam.rotation.order='YXZ'; cam.rotation.y=yaw; cam.rotation.x=pitch;
  document.getElementById('posinfo').textContent=`X:${Math.round(px)} Y:${Math.round(py)} Z:${Math.round(pz)}`;
}

// Multiplayer
let uid='',dname='',pref;
const others={};
let ls=0;
function initMP(){
  pref=ref(db,`vc/p/${uid}`);
  set(pref,{n:dname,x:0,y:22,z:0});
  onDisconnect(pref).remove();
  onValue(ref(db,'vc/p'),snap=>{
    const d=snap.val()||{};
    Object.keys(others).forEach(id=>{ if(!d[id]||id===uid){sc.remove(others[id]);delete others[id];} });
    Object.entries(d).forEach(([id,p])=>{
      if(id===uid) return;
      if(!others[id]){
        const g=new THREE.Group();
        g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(0.6,0.9,0.3),gm(0x3498db)),{position:{x:0,y:0,z:0}}));
        const hd=new THREE.Mesh(new THREE.BoxGeometry(0.5,0.5,0.5),gm(0xf1c40f));
        hd.position.y=0.7; g.add(hd);
        sc.add(g); others[id]=g;
      }
      others[id].position.set(p.x||0,(p.y||20)-0.9,p.z||0);
    });
    document.getElementById('pnames').innerHTML=Object.values(d).map(p=>`• ${p.n||'Mehmon'}`).join('<br>')||'<span style="color:#666">Hech kim yo\'q</span>';
  });
}
function syncP(){
  if(!pref) return;
  set(pref,{n:dname,x:+px.toFixed(1),y:+py.toFixed(1),z:+pz.toFixed(1),yaw:+yaw.toFixed(2)});
}

// Chat
function openChat(){chat=true;const ci=document.getElementById('chatinput');ci.style.display='block';ci.focus();document.exitPointerLock();}
function closeChat(){chat=false;const ci=document.getElementById('chatinput');ci.style.display='none';ci.value='';}
function sendChat(){const msg=document.getElementById('chatinput').value.trim();if(msg)push(ref(db,'vc/chat'),{n:dname,m:msg,t:Date.now()});closeChat();}
onValue(ref(db,'vc/chat'),snap=>{
  const d=snap.val()||{};
  const msgs=Object.values(d).sort((a,b)=>a.t-b.t).slice(-25);
  const el=document.getElementById('chatmsgs');
  el.innerHTML=msgs.map(m=>`<p><b style="color:#5dfc5d">${m.n}:</b> ${m.m}</p>`).join('');
  el.scrollTop=el.scrollHeight;
});

// Pause
function tPause(){pause=!pause;document.getElementById('pause').style.display=pause?'flex':'none';if(!pause)cv.requestPointerLock();}
document.getElementById('resumebtn').onclick=()=>{pause=false;document.getElementById('pause').style.display='none';cv.requestPointerLock();};

// World load
function loadW(cb){
  dbg('Firebase dunyo yuklanmoqda...');
  get(ref(db,'vc/w')).then(snap=>{
    const d=snap.val();
    if(d&&Object.keys(d).length>80){
      dbg('Firebase dunyo topildi, yuklanmoqda...');
      let i=0,total=Object.keys(d).length;
      Object.entries(d).forEach(([k,id])=>{
        const[x,y,z]=k.split(',').map(Number);
        addB(x,y,z,id);
        i++;
      });
      dbg(`${total} blok yuklandi ✅`);
      cb();
    } else {
      genWorld();
      const wo={};Object.entries(WD).forEach(([k,id])=>wo[k]=id);
      dbg('Firebase ga saqlanmoqda...');
      set(ref(db,'vc/w'),wo).then(()=>{ dbg('Saqlandi ✅'); cb(); }).catch(e=>{ dbg('Saqlash xato: '+e.message); cb(); });
    }
  }).catch(e=>{ dbg('Firebase yuklash xato: '+e.message+' — offline rejim'); genWorld(); cb(); });
}
function watchW(){
  onValue(ref(db,'vc/w'),snap=>{
    const d=snap.val()||{};
    Object.keys(WD).forEach(k=>{ if(!d[k]){const[x,y,z]=k.split(',').map(Number);delB(x,y,z,false);} });
    Object.entries(d).forEach(([k,id])=>{ if(!WD[k]){const[x,y,z]=k.split(',').map(Number);addB(x,y,z,id,false);} });
  });
}

// Loop
const clk=new THREE.Clock();
let lf=0,fc=0;
function loop(){
  requestAnimationFrame(loop);
  if(!active||pause) return;
  const dt=Math.min(clk.getDelta(),0.05);
  phys(dt);
  const now=Date.now();
  if(now-ls>200){syncP();ls=now;}
  fc++;
  if(now-lf>1000){document.getElementById('fpsinfo').textContent='FPS:'+fc;fc=0;lf=now;}
  rdr.render(sc,cam);
}

// Start
function startGame(u,name){
  uid=u; dname=name;
  dbg('O\'yinga kirildi: '+name);
  document.getElementById('overlay').style.display='none';
  loadW(()=>{
    initMP(); watchW();
    active=true; clk.start(); loop();
    setTimeout(()=>cv.requestPointerLock(),500);
  });
}

// Buttons
document.getElementById('gbtn').onclick=async()=>{
  document.getElementById('errmsg').textContent='';
  document.getElementById('statusmsg').textContent='Google bilan kirilmoqda...';
  try {
    const r=await signInWithPopup(auth,new GoogleAuthProvider());
    startGame(r.user.uid, r.user.displayName||'Player');
  } catch(e){
    document.getElementById('statusmsg').textContent='';
    document.getElementById('errmsg').textContent='Google xato: '+e.code;
    dbg('Google xato: '+e.message);
  }
};

document.getElementById('abtn').onclick=async()=>{
  document.getElementById('errmsg').textContent='';
  document.getElementById('statusmsg').textContent='Mehmon sifatida kirilmoqda...';
  dbg('signInAnonymously chaqirilmoqda...');
  try {
    const r=await signInAnonymously(auth);
    dbg('Muvaffaqiyatli! uid='+r.user.uid);
    startGame(r.user.uid,'Mehmon_'+Math.floor(Math.random()*9000+1000));
  } catch(e){
    document.getElementById('statusmsg').textContent='';
    document.getElementById('errmsg').textContent='Xato: '+e.code+' — '+e.message;
    dbg('signInAnonymously xato: '+e.code+': '+e.message);
  }
};

onAuthStateChanged(auth,user=>{ if(user&&user.displayName) document.getElementById('statusmsg').textContent='Salom, '+user.displayName+'!'; });
window.addEventListener('resize',()=>{rdr.setSize(innerWidth,innerHeight);cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();});
</script>
</body>
</html>
