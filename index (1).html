<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚀 Space Defender — Firebase 3D</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family:'Courier New',monospace; }
#gameCanvas { display:block; cursor:crosshair; }
#ui { position:absolute; top:0; left:0; width:100%; pointer-events:none; }
#score-bar {
  display:flex; justify-content:space-between; align-items:center;
  padding:10px 16px; background:rgba(0,0,0,0.65);
  border-bottom:1px solid rgba(0,255,180,0.3); color:#00ffb4; font-size:14px;
}
#leaderboard {
  position:absolute; right:12px; top:52px;
  background:rgba(0,0,0,0.8); border:1px solid rgba(0,255,180,0.3);
  border-radius:8px; padding:10px 14px; color:#00ffb4; font-size:12px; min-width:170px;
}
#leaderboard h3 { font-size:11px; color:#aaa; margin-bottom:6px; letter-spacing:1px; text-transform:uppercase; }
#lb-list { list-style:none; }
#lb-list li { padding:3px 0; display:flex; justify-content:space-between; gap:10px; }
#lb-list li span:last-child { color:#fff; }
#overlay {
  position:absolute; top:0; left:0; width:100%; height:100%;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  background:rgba(0,0,0,0.88); color:#00ffb4; text-align:center;
}
#overlay h1 { font-size:32px; margin-bottom:8px; letter-spacing:3px; text-shadow:0 0 20px #00ffb4; }
#overlay p { color:#aaa; font-size:13px; margin-bottom:20px; }
#nameInput {
  background:rgba(0,255,180,0.1); border:1px solid #00ffb4;
  color:#00ffb4; padding:9px 16px; border-radius:6px;
  font-size:14px; font-family:'Courier New'; outline:none;
  margin-bottom:14px; text-align:center; width:220px;
}
.btn {
  background:rgba(0,255,180,0.12); border:1px solid #00ffb4;
  color:#00ffb4; padding:11px 32px; border-radius:6px;
  font-size:15px; cursor:pointer; font-family:'Courier New';
  letter-spacing:1px; transition:background 0.2s;
}
.btn:hover { background:rgba(0,255,180,0.28); }
#gameover { display:none; }
#gameover h2 { font-size:26px; margin-bottom:8px; color:#ff4466; text-shadow:0 0 15px #ff4466; }
#controls { position:absolute; bottom:12px; left:50%; transform:translateX(-50%);
  color:rgba(255,255,255,0.3); font-size:11px; pointer-events:none; }
.flash-msg {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  color:#00ffb4; font-size:24px; font-weight:bold; pointer-events:none;
  text-shadow:0 0 20px #00ffb4; animation:fadeOut 1.4s forwards;
}
@keyframes fadeOut { 0%{opacity:1} 60%{opacity:1} 100%{opacity:0} }
#hp-bar { position:absolute; top:48px; left:50%; transform:translateX(-50%);
  width:220px; display:none; }
#hp-bar-inner { height:8px; background:#ff0044; border-radius:4px; transition:width 0.2s; box-shadow:0 0 8px #ff0044; }
#hp-label { color:#ff4466; font-size:11px; text-align:center; margin-top:3px; }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<div id="ui">
  <div id="score-bar">
    <span>⭐ <b id="scoreVal">0</b></span>
    <span>❤️ <b id="livesVal">3</b></span>
    <span>🎯 LEVEL <b id="levelVal">1</b></span>
    <span>💀 BOSS: <b id="bossVal">—</b></span>
  </div>
  <div id="hp-bar">
    <div id="hp-bar-inner" style="width:100%"></div>
    <div id="hp-label">BOSS HP</div>
  </div>
  <div id="leaderboard">
    <h3>🏆 Top Pilotlar</h3>
    <ul id="lb-list"><li><span style="color:#aaa">Yuklanmoqda...</span></li></ul>
  </div>
  <div id="controls">← → yoki A D harakat &nbsp;|&nbsp; SPACE otish &nbsp;|&nbsp; MOUSE nishon</div>
</div>

<div id="overlay">
  <div id="start-screen">
    <h1>🚀 SPACE DEFENDER</h1>
    <p>Firebase global leaderboard bilan 3D kosmik o'yin!</p>
    <input id="nameInput" placeholder="Ismingiz (max 12 harf)" maxlength="12" autocomplete="off" /><br>
    <button class="btn" id="startBtn">▶ BOSHLASH</button>
    <p style="margin-top:16px; font-size:11px; color:#444;">Firebase: mingbulak-ijara</p>
  </div>
  <div id="gameover">
    <h2>💀 O'YIN TUGADI</h2>
    <p style="font-size:16px; margin-bottom:6px;">Balling: <b id="finalScore" style="color:#fff; font-size:22px">0</b></p>
    <p id="rankMsg" style="color:#aaa; margin-bottom:18px;"></p>
    <button class="btn" id="restartBtn">🔄 QAYTA URINISH</button>
  </div>
</div>

<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ─── Firebase ───────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyCpFL2AJO17gfjQa2TTcNqa-lAdEgqVxpw",
  authDomain: "mingbulak-ijara.firebaseapp.com",
  databaseURL: "https://mingbulak-ijara-default-rtdb.firebaseio.com",
  projectId: "mingbulak-ijara",
  storageBucket: "mingbulak-ijara.firebasestorage.app",
  messagingSenderId: "999036185534",
  appId: "1:999036185534:web:3d3ee2a80102d4fc85a7ef"
};
const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

// ─── Three.js setup ─────────────────────────────────────────
const canvas   = document.getElementById('gameCanvas');
const W = window.innerWidth, H = window.innerHeight;
canvas.width = W; canvas.height = H;

const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x00000a);
scene.fog = new THREE.Fog(0x00000a, 35, 120);

const camera = new THREE.PerspectiveCamera(70, W/H, 0.1, 200);
camera.position.set(0, 7, 20);
camera.lookAt(0, 0, 0);

// Lighting
scene.add(new THREE.AmbientLight(0x112255, 1.4));
const dir = new THREE.DirectionalLight(0x4488ff, 2); dir.position.set(5,10,5); scene.add(dir);
const shipGlow = new THREE.PointLight(0x00ffcc, 3, 12); scene.add(shipGlow);

// Stars
const starGeo = new THREE.BufferGeometry();
const starPositions = [];
for(let i=0;i<600;i++){
  starPositions.push((Math.random()-0.5)*250, (Math.random()-0.5)*100, -(Math.random()*200+5));
}
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPositions,3));
const starMat = new THREE.PointsMaterial({ color:0xffffff, size:0.2 });
const starField = new THREE.Points(starGeo, starMat);
scene.add(starField);

// ─── Mesh helpers ───────────────────────────────────────────
function makeShip() {
  const g = new THREE.Group();
  const body = new THREE.Mesh(
    new THREE.ConeGeometry(0.55, 2.4, 8),
    new THREE.MeshPhongMaterial({ color:0x00d4ff, emissive:0x003366, shininess:140 })
  );
  body.rotation.x = Math.PI/2; g.add(body);
  const wing = new THREE.Mesh(
    new THREE.BoxGeometry(3, 0.09, 1),
    new THREE.MeshPhongMaterial({ color:0x0077bb, emissive:0x001133 })
  );
  wing.position.z = 0.4; g.add(wing);
  const eng = new THREE.Mesh(
    new THREE.CylinderGeometry(0.22, 0.3, 0.55, 8),
    new THREE.MeshPhongMaterial({ color:0xff6600, emissive:0xff2200 })
  );
  eng.position.z = 0.9; g.add(eng);
  return g;
}

function makeEnemy(level) {
  const g = new THREE.Group();
  const cols = [0xff2244, 0xff8800, 0xcc00ff, 0xff0066, 0x00ccff];
  const c = cols[Math.floor(Math.random()*cols.length)];
  const body = new THREE.Mesh(
    new THREE.OctahedronGeometry(0.6 + level*0.06, 0),
    new THREE.MeshPhongMaterial({ color:c, emissive:new THREE.Color(c).multiplyScalar(0.25), shininess:90 })
  );
  g.add(body);
  const ring = new THREE.Mesh(
    new THREE.TorusGeometry(0.95, 0.07, 6, 18),
    new THREE.MeshBasicMaterial({ color:c })
  );
  g.add(ring);
  g.userData.hp    = 1 + Math.floor(level/3);
  g.userData.color = c;
  g.userData.speed = 0.04 + level*0.007 + Math.random()*0.025;
  g.userData.wobble = Math.random()*Math.PI*2;
  return g;
}

function makeBoss(level) {
  const g = new THREE.Group();
  const body = new THREE.Mesh(
    new THREE.DodecahedronGeometry(2.0, 1),
    new THREE.MeshPhongMaterial({ color:0xff0044, emissive:0x550011, shininess:200 })
  );
  g.add(body);
  for(let i=0;i<5;i++){
    const arm = new THREE.Mesh(
      new THREE.CylinderGeometry(0.12,0.32,1.8,6),
      new THREE.MeshPhongMaterial({ color:0xff4400, emissive:0x220000 })
    );
    arm.rotation.z = (i/5)*Math.PI*2;
    arm.position.set(Math.cos((i/5)*Math.PI*2)*2.6, Math.sin((i/5)*Math.PI*2)*2.6, 0);
    g.add(arm);
  }
  g.add(new THREE.PointLight(0xff0044, 5, 20));
  const maxHp = 10 + level*5;
  g.userData.hp = maxHp; g.userData.maxHp = maxHp; g.userData.isBoss = true;
  return g;
}

function makeBullet(pos, dir, enemy=false) {
  const mesh = new THREE.Mesh(
    new THREE.CylinderGeometry(0.06,0.06,0.7,6),
    new THREE.MeshBasicMaterial({ color: enemy ? 0xff3300 : 0x00ffcc })
  );
  mesh.rotation.x = Math.PI/2;
  mesh.position.copy(pos);
  mesh.add(new THREE.PointLight(enemy ? 0xff3300 : 0x00ffcc, 1.8, 4));
  mesh.userData.dir   = dir.clone();
  mesh.userData.enemy = enemy;
  return mesh;
}

function explode(pos, color=0xff6600) {
  const arr=[];
  for(let i=0;i<20;i++){
    const p = new THREE.Mesh(
      new THREE.SphereGeometry(0.13,4,4),
      new THREE.MeshBasicMaterial({ color, transparent:true })
    );
    p.position.copy(pos);
    p.userData.vel = new THREE.Vector3((Math.random()-.5)*.35,(Math.random()-.5)*.35,(Math.random()-.5)*.35);
    p.userData.life = 1;
    scene.add(p); arr.push(p);
  }
  return arr;
}

function flash(msg) {
  const d = document.createElement('div');
  d.className = 'flash-msg'; d.textContent = msg;
  document.getElementById('ui').appendChild(d);
  setTimeout(()=>d.remove(), 1500);
}

// ─── Game state ─────────────────────────────────────────────
let playerName = 'PILOT';
let score=0, lives=3, level=1, running=false;
let ship, bullets=[], enemies=[], boss=null, eBullets=[], particles=[];
let keys={}, mouseX=0;
let eTick=0, shootCD=0, killed=0, killGoal=8;
let frame=0;

function initGame() {
  scene.children.filter(c=>c.userData.game).forEach(c=>scene.remove(c));
  bullets=[]; enemies=[]; boss=null; eBullets=[]; particles=[];
  score=0; lives=3; level=1; killed=0; killGoal=8;
  eTick=0; shootCD=0; frame=0;

  ship = makeShip();
  ship.position.set(0,0,8);
  ship.userData.game = true;
  scene.add(ship);

  document.getElementById('scoreVal').textContent = '0';
  document.getElementById('livesVal').textContent = '3';
  document.getElementById('levelVal').textContent = '1';
  document.getElementById('bossVal').textContent  = '—';
  document.getElementById('hp-bar').style.display = 'none';
}

function spawnEnemy() {
  const e = makeEnemy(level);
  e.position.set((Math.random()-.5)*20, (Math.random()-.5)*5, -28);
  e.userData.game = true;
  scene.add(e); enemies.push(e);
}

async function saveScore() {
  const key = playerName.replace(/\W/g,'_') + '_' + Date.now();
  try {
    const existing = await get(ref(db, `space_game/scores/${playerName.replace(/\W/g,'_')}`));
    if(!existing.exists() || existing.val().score < score){
      await set(ref(db, `space_game/scores/${playerName.replace(/\W/g,'_')}`), {
        name: playerName, score, level, ts: Date.now()
      });
    }
  } catch(e){ console.warn('Firebase save error:', e); }
}

function loadLeaderboard() {
  onValue(ref(db,'space_game/scores'), snap => {
    const d = snap.val();
    if(!d) return;
    const sorted = Object.values(d).sort((a,b)=>b.score-a.score).slice(0,8);
    const medals = ['🥇','🥈','🥉','4.','5.','6.','7.','8.'];
    document.getElementById('lb-list').innerHTML =
      sorted.map((p,i)=>`<li><span>${medals[i]} ${p.name}</span><span>${p.score.toLocaleString()}</span></li>`).join('');
  });
}

function gameOver() {
  running = false;
  saveScore();
  document.getElementById('finalScore').textContent = score.toLocaleString();
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('gameover').style.display    = 'block';
  document.getElementById('overlay').style.display     = 'flex';
}

// ─── Controls ───────────────────────────────────────────────
document.addEventListener('keydown', e=>{ keys[e.code]=true; if(['Space','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault(); });
document.addEventListener('keyup',   e=>{ keys[e.code]=false; });
canvas.addEventListener('mousemove', e=>{ mouseX = (e.clientX/W-.5)*22; });
canvas.addEventListener('click', ()=>{ if(running&&shootCD<=0) shoot(); });

document.getElementById('startBtn').addEventListener('click', ()=>{
  const n = document.getElementById('nameInput').value.trim();
  if(n) playerName = n.toUpperCase().substring(0,12);
  document.getElementById('overlay').style.display = 'none';
  initGame(); running = true; loadLeaderboard();
});
document.getElementById('restartBtn').addEventListener('click', ()=>{
  document.getElementById('gameover').style.display    = 'none';
  document.getElementById('start-screen').style.display = 'block';
  document.getElementById('overlay').style.display     = 'flex';
});

function shoot() {
  const b = makeBullet(ship.position.clone().add(new THREE.Vector3(0,0,-1)), new THREE.Vector3(0,0,-1));
  b.userData.game = true; scene.add(b); bullets.push(b); shootCD = 11;
}

// ─── Main loop ──────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  frame++;

  // Stars scroll
  const pos = starGeo.attributes.position;
  for(let i=0;i<pos.count;i++){
    pos.setZ(i, pos.getZ(i)+0.06);
    if(pos.getZ(i)>25) pos.setZ(i,-200);
  }
  pos.needsUpdate = true;

  if(!running){ renderer.render(scene,camera); return; }

  // Ship movement
  if(keys['ArrowLeft']||keys['KeyA']) ship.position.x = Math.max(ship.position.x-.2,-10);
  if(keys['ArrowRight']||keys['KeyD']) ship.position.x = Math.min(ship.position.x+.2, 10);
  if(keys['Space']&&shootCD<=0) shoot();
  if(shootCD>0) shootCD--;

  ship.position.x += (mouseX*.14 - ship.position.x)*.05;
  ship.rotation.z  = (ship.position.x - mouseX*.1)*-.07;
  shipGlow.position.copy(ship.position);

  // Player bullets
  bullets = bullets.filter(b=>{
    b.position.addScaledVector(b.userData.dir, 0.75);
    if(b.position.z < -36){ scene.remove(b); return false; }
    return true;
  });

  // Enemy bullets
  eBullets = eBullets.filter(b=>{
    b.position.addScaledVector(b.userData.dir, 0.38);
    if(b.position.distanceTo(ship.position)<0.9){
      scene.remove(b);
      particles.push(...explode(ship.position.clone(), 0x0088ff));
      lives--; document.getElementById('livesVal').textContent=lives;
      if(lives<=0) gameOver();
      return false;
    }
    if(b.position.z>16){ scene.remove(b); return false; }
    return true;
  });

  // Spawn enemies
  if(!boss){
    eTick++;
    const rate = Math.max(38, 92-level*7);
    if(eTick>=rate){ spawnEnemy(); eTick=0; }
  }

  // Enemy update
  enemies = enemies.filter(e=>{
    e.userData.wobble += 0.02;
    e.position.z += e.userData.speed;
    e.position.x += Math.sin(e.userData.wobble)*0.05;
    e.rotation.y += 0.03; e.rotation.x += 0.015;

    if(e.position.z>13){
      scene.remove(e); lives--;
      document.getElementById('livesVal').textContent=lives;
      if(lives<=0) gameOver();
      return false;
    }

    // Hit by bullet?
    for(let j=bullets.length-1;j>=0;j--){
      if(bullets[j]&&bullets[j].position.distanceTo(e.position)<1.0){
        scene.remove(bullets[j]); bullets.splice(j,1);
        e.userData.hp--;
        if(e.userData.hp<=0){
          particles.push(...explode(e.position.clone(), e.userData.color));
          scene.remove(e);
          score += 10*level;
          document.getElementById('scoreVal').textContent = score.toLocaleString();
          killed++;
          if(killed>=killGoal&&!boss){
            level++; killed=0; killGoal+=3;
            document.getElementById('levelVal').textContent=level;
            flash(`⬆ LEVEL ${level}!`);
            if(level%3===0){
              boss = makeBoss(level);
              boss.position.set(0,0,-32);
              boss.userData.game = true;
              scene.add(boss);
              enemies.forEach(en=>scene.remove(en)); enemies.length=0;
              document.getElementById('bossVal').textContent = `${boss.userData.hp}/${boss.userData.maxHp}`;
              document.getElementById('hp-bar').style.display = 'block';
              flash('💀 BOSS KELDI!');
            }
          }
          return false;
        }
      }
    }

    // Enemy shoots
    if(frame%(Math.max(20, 55-level*3))===Math.floor(Math.random()*5)&&Math.random()<.35){
      const dir = new THREE.Vector3().subVectors(ship.position,e.position).normalize();
      const b = makeBullet(e.position.clone(), dir, true);
      b.userData.game=true; scene.add(b); eBullets.push(b);
    }
    return true;
  });

  // Boss update
  if(boss){
    boss.rotation.y += 0.022; boss.rotation.z += 0.012;
    boss.position.x  = Math.sin(frame*0.013)*8;
    if(boss.position.z<0) boss.position.z += boss.userData.speed;

    if(boss.position.z>15){ lives=0; gameOver(); }

    for(let j=bullets.length-1;j>=0;j--){
      if(bullets[j]&&bullets[j].position.distanceTo(boss.position)<2.8){
        scene.remove(bullets[j]); bullets.splice(j,1);
        boss.userData.hp--;
        const pct = boss.userData.hp/boss.userData.maxHp;
        document.getElementById('hp-bar-inner').style.width = (pct*100)+'%';
        document.getElementById('bossVal').textContent = `${boss.userData.hp}/${boss.userData.maxHp}`;
        if(boss.userData.hp<=0){
          particles.push(...explode(boss.position.clone(),0xff0044));
          [1,2,3].forEach(k=>setTimeout(()=>particles.push(...explode(
            boss.position.clone().add(new THREE.Vector3((Math.random()-.5)*3,(Math.random()-.5)*3,0)),0xff6600
          )),k*180));
          scene.remove(boss); boss=null;
          score+=500*level;
          document.getElementById('scoreVal').textContent=score.toLocaleString();
          document.getElementById('bossVal').textContent='—';
          document.getElementById('hp-bar').style.display='none';
          flash('🏆 BOSS YENGILDI! +'+500*level);
        }
      }
    }

    if(frame%28===0){
      for(let k=0;k<3;k++){
        const off = new THREE.Vector3((Math.random()-.5)*2,(Math.random()-.5)*2,0);
        const dir = new THREE.Vector3().subVectors(ship.position, boss.position.clone().add(off)).normalize();
        const b = makeBullet(boss.position.clone().add(off),dir,true);
        b.userData.game=true; scene.add(b); eBullets.push(b);
      }
    }
  }

  // Particles
  particles = particles.filter(p=>{
    p.userData.life -= 0.05;
    p.position.addScaledVector(p.userData.vel,1);
    p.material.opacity = p.userData.life;
    p.scale.setScalar(p.userData.life);
    if(p.userData.life<=0){ scene.remove(p); return false; }
    return true;
  });

  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
