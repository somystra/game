<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>VoxelCraft Online</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family:'Segoe UI',sans-serif; }
#c { display:block; width:100vw; height:100vh; }
#crosshair {
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  width:24px; height:24px; pointer-events:none;
}
#crosshair::before, #crosshair::after {
  content:''; position:absolute; background:rgba(255,255,255,0.85);
}
#crosshair::before { width:2px; height:100%; left:50%; transform:translateX(-50%); }
#crosshair::after  { height:2px; width:100%; top:50%; transform:translateY(-50%); }
#hud { position:fixed; bottom:0; left:0; right:0; display:flex; flex-direction:column; align-items:center; gap:6px; padding-bottom:14px; pointer-events:none; }
#hotbar { display:flex; gap:4px; }
.slot { width:52px; height:52px; border:2px solid rgba(255,255,255,0.3); border-radius:6px; background:rgba(0,0,0,0.55); display:flex; flex-direction:column; align-items:center; justify-content:center; font-size:10px; color:#fff; cursor:pointer; transition: border-color 0.1s; }
.slot.active { border-color:#fff; box-shadow:0 0 8px rgba(255,255,255,0.5); }
.slot-icon { width:32px; height:32px; border-radius:3px; margin-bottom:2px; }
.slot-label { font-size:9px; color:rgba(255,255,255,0.7); }
#info { position:fixed; top:10px; left:10px; color:#fff; font-size:13px; background:rgba(0,0,0,0.55); padding:8px 12px; border-radius:8px; line-height:1.7; }
#players-list { position:fixed; top:10px; right:10px; color:#fff; font-size:12px; background:rgba(0,0,0,0.55); padding:8px 12px; border-radius:8px; min-width:140px; }
#players-list h4 { color:#00ffb4; margin-bottom:4px; font-size:11px; }
#overlay { position:fixed; inset:0; background:rgba(0,0,0,0.92); display:flex; flex-direction:column; align-items:center; justify-content:center; color:#fff; z-index:100; gap:14px; }
#overlay h1 { font-size:36px; color:#5dfc5d; text-shadow:0 0 20px #5dfc5d; letter-spacing:2px; }
#overlay p { color:#aaa; font-size:14px; }
.menu-btn { padding:12px 36px; font-size:15px; border-radius:8px; border:none; cursor:pointer; font-family:'Segoe UI'; font-weight:600; transition:transform 0.1s; }
.menu-btn:hover { transform:scale(1.04); }
#googleBtn { background:#4285f4; color:#fff; }
#guestBtn  { background:#333; color:#ccc; border:1px solid #555; }
#pause { position:fixed; inset:0; background:rgba(0,0,0,0.75); display:none; flex-direction:column; align-items:center; justify-content:center; color:#fff; z-index:99; gap:16px; }
#pause h2 { font-size:28px; }
#chat-box { position:fixed; bottom:80px; left:12px; width:280px; z-index:50; }
#chat-messages { background:rgba(0,0,0,0.55); border-radius:6px; padding:6px 8px; max-height:140px; overflow-y:auto; font-size:12px; color:#fff; margin-bottom:4px; }
#chat-messages p { margin-bottom:2px; }
#chat-input { width:100%; background:rgba(0,0,0,0.7); border:1px solid rgba(255,255,255,0.3); color:#fff; padding:6px 10px; border-radius:6px; font-size:13px; display:none; outline:none; }
#loading { position:fixed; inset:0; background:#111; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#5dfc5d; font-size:18px; gap:12px; z-index:200; }
#loading-bar-wrap { width:260px; height:8px; background:#333; border-radius:4px; }
#loading-bar { height:100%; background:#5dfc5d; border-radius:4px; transition:width 0.3s; width:0%; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="crosshair"></div>
<div id="hud"><div id="hotbar"></div></div>
<div id="info">
  <div id="pos-info">X:0 Y:0 Z:0</div>
  <div id="fps-info">FPS: 0</div>
  <div id="block-info">Blok: Grass</div>
  <div style="color:#aaa;font-size:11px;margin-top:4px;">T=Chat | ESC=Pauza | 1-9=Blok</div>
</div>
<div id="players-list">
  <h4>👥 Online</h4>
  <div id="player-names"></div>
</div>
<div id="chat-box">
  <div id="chat-messages"></div>
  <input id="chat-input" placeholder="Xabar... (Enter)" />
</div>
<div id="overlay">
  <h1>⛏ VoxelCraft</h1>
  <p>Firebase multiplayer voxel o'yini</p>
  <div id="nameDisplay" style="color:#5dfc5d;font-size:13px;"></div>
  <button class="menu-btn" id="googleBtn">🔑 Google bilan kirish</button>
  <button class="menu-btn" id="guestBtn">👤 Mehmon sifatida</button>
</div>
<div id="pause">
  <h2>⏸ Pauza</h2>
  <button class="menu-btn" style="background:#5dfc5d;color:#000;" id="resumeBtn">▶ Davom</button>
  <button class="menu-btn" style="background:#e74c3c;color:#fff;" onclick="location.reload()">🚪 Chiqish</button>
</div>
<div id="loading">
  <div>⛏ VoxelCraft yuklanmoqda...</div>
  <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
  <div id="loading-text" style="font-size:13px;color:#aaa;">Tayyorlanmoqda...</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithPopup, signInAnonymously, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, set, get, onValue, remove, onDisconnect, serverTimestamp, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const fbConfig = {
  apiKey:"AIzaSyCpFL2AJO17gfjQa2TTcNqa-lAdEgqVxpw",
  authDomain:"mingbulak-ijara.firebaseapp.com",
  databaseURL:"https://mingbulak-ijara-default-rtdb.firebaseio.com",
  projectId:"mingbulak-ijara",
  storageBucket:"mingbulak-ijara.firebasestorage.app",
  messagingSenderId:"999036185534",
  appId:"1:999036185534:web:3d3ee2a80102d4fc85a7ef"
};
const fbApp = initializeApp(fbConfig);
const auth  = getAuth(fbApp);
const db    = getDatabase(fbApp);
const gprov = new GoogleAuthProvider();

const BLOCKS = {
  1:{ name:'Grass',   color:0x4CAF50 },
  2:{ name:'Dirt',    color:0x795548 },
  3:{ name:'Stone',   color:0x9E9E9E },
  4:{ name:'Wood',    color:0x8D6E63 },
  5:{ name:'Leaves',  color:0x388E3C },
  6:{ name:'Sand',    color:0xF9A825 },
  7:{ name:'Water',   color:0x1565C0, transparent:true },
  8:{ name:'Coal Ore',color:0x424242 },
  9:{ name:'Iron Ore',color:0xBCAAA4 },
};
const HOTBAR = [1,2,3,4,5,6,7,8,9];

// Three.js
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 40, 90);
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 200);
camera.position.set(0, 22, 0);

const sun = new THREE.DirectionalLight(0xffffff, 1.4);
sun.position.set(50,80,30); sun.castShadow=true;
sun.shadow.mapSize.set(1024,1024);
sun.shadow.camera.left=-60; sun.shadow.camera.right=60;
sun.shadow.camera.top=60; sun.shadow.camera.bottom=-60;
sun.shadow.camera.far=200;
scene.add(sun);
scene.add(new THREE.AmbientLight(0xaaccff, 0.8));
scene.add(new THREE.HemisphereLight(0x87CEEB, 0x556B2F, 0.4));

const BOX_GEO = new THREE.BoxGeometry(1,1,1);
const matCache = {};
function getMat(color, transparent=false){
  const k=color+'_'+transparent;
  if(!matCache[k]) matCache[k]=new THREE.MeshLambertMaterial({color,transparent,opacity:transparent?0.65:1});
  return matCache[k];
}

const worldMeshes={}, worldData={};
function bk(x,y,z){return `${Math.round(x)},${Math.round(y)},${Math.round(z)}`;}

function addBlock(x,y,z,id,save=false){
  const k=bk(x,y,z);
  if(worldMeshes[k]) return;
  const b=BLOCKS[id]; if(!b) return;
  const m=new THREE.Mesh(BOX_GEO, getMat(b.color,!!b.transparent));
  m.position.set(x,y,z); m.castShadow=!b.transparent; m.receiveShadow=true;
  m.userData={id,bx:x,by:y,bz:z};
  scene.add(m); worldMeshes[k]=m; worldData[k]=id;
  if(save) set(ref(db,`voxelcraft/world/${k}`),id);
}

function removeBlock(x,y,z,save=false){
  const k=bk(x,y,z);
  if(!worldMeshes[k]) return;
  scene.remove(worldMeshes[k]); delete worldMeshes[k]; delete worldData[k];
  if(save) remove(ref(db,`voxelcraft/world/${k}`));
}

function noise(x,z){
  return Math.sin(x*0.08+1.3)*Math.cos(z*0.08+2.1)*3
        +Math.sin(x*0.17+0.5)*Math.cos(z*0.14+1.2)*1.5
        +Math.sin(x*0.03+3.1)*Math.cos(z*0.025+0.8)*5;
}

function generateWorld(){
  const S=32;
  for(let x=-S/2;x<S/2;x++) for(let z=-S/2;z<S/2;z++){
    const h=Math.round(8+noise(x,z));
    for(let y=0;y<=h;y++){
      let id;
      if(y===h) id=(h<7)?6:1;
      else if(y>=h-3) id=2;
      else id=(Math.random()<0.06)?(Math.random()<0.5?8:9):3;
      addBlock(x,y,z,id);
    }
    if(h<6) for(let wy=h+1;wy<=6;wy++) addBlock(x,wy,z,7);
    if(h>=7&&Math.random()<0.04){
      const th=4+Math.floor(Math.random()*2);
      for(let ty=h+1;ty<h+1+th;ty++) addBlock(x,ty,z,4);
      for(let lx=-2;lx<=2;lx++) for(let lz=-2;lz<=2;lz++) for(let ly=0;ly<2;ly++)
        if(Math.abs(lx)+Math.abs(lz)<=3) addBlock(x+lx,h+1+th+ly,z+lz,5);
    }
  }
}

// Hotbar
HOTBAR.forEach((id,i)=>{
  const s=document.createElement('div');
  s.className='slot'+(i===0?' active':''); s.id='slot'+i;
  s.innerHTML=`<div class="slot-icon" style="background:#${BLOCKS[id].color.toString(16).padStart(6,'0')}"></div><div class="slot-label">${BLOCKS[id].name}</div>`;
  s.onclick=()=>{selectedSlot=i;updateHotbar();};
  document.getElementById('hotbar').appendChild(s);
});
let selectedSlot=0;
function updateHotbar(){
  HOTBAR.forEach((_,i)=>document.getElementById('slot'+i).className='slot'+(i===selectedSlot?' active':''));
  document.getElementById('block-info').textContent='Blok: '+BLOCKS[HOTBAR[selectedSlot]].name;
}

// Controls
const keys={};
let chatOpen=false, paused=false, gameActive=false;
document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(e.code==='KeyT'&&!chatOpen&&gameActive){e.preventDefault();openChat();}
  if(e.code==='Escape'&&gameActive){if(chatOpen)closeChat();else togglePause();}
  if(e.code==='Enter'&&chatOpen){e.preventDefault();sendChat();}
  const n=parseInt(e.key);
  if(!isNaN(n)&&n>=1&&n<=9&&!chatOpen){selectedSlot=n-1;updateHotbar();}
});
document.addEventListener('keyup',e=>keys[e.code]=false);

let locked=false, yaw=0, pitch=0;
canvas.addEventListener('click',()=>{if(gameActive&&!paused)canvas.requestPointerLock();});
document.addEventListener('pointerlockchange',()=>{locked=document.pointerLockElement===canvas;});
document.addEventListener('mousemove',e=>{
  if(!locked||chatOpen) return;
  yaw-=e.movementX*0.002;
  pitch=Math.max(-1.55,Math.min(1.55,pitch-e.movementY*0.002));
});
document.addEventListener('wheel',e=>{selectedSlot=(selectedSlot+(e.deltaY>0?1:-1)+9)%9;updateHotbar();});

const raycaster=new THREE.Raycaster(); raycaster.far=6;
document.addEventListener('mousedown',e=>{
  if(!locked||chatOpen) return;
  raycaster.setFromCamera(new THREE.Vector2(0,0),camera);
  const hits=raycaster.intersectObjects(Object.values(worldMeshes));
  if(!hits.length) return;
  const {bx,by,bz}=hits[0].object.userData;
  if(e.button===0){removeBlock(bx,by,bz,true);}
  else if(e.button===2){
    const n=hits[0].face.normal;
    const nx=Math.round(bx+n.x),ny=Math.round(by+n.y),nz=Math.round(bz+n.z);
    if(Math.abs(nx-px)<0.9&&Math.abs(ny-py)<1.5&&Math.abs(nz-pz)<0.9) return;
    addBlock(nx,ny,nz,HOTBAR[selectedSlot],true);
  }
});
canvas.addEventListener('contextmenu',e=>e.preventDefault());

// Physics
let px=0,py=22,pz=0;
const vel=new THREE.Vector3();
let onGround=false;
const GRAVITY=-28, JUMP=10, SPEED=6, PH=1.8;

function isBlocked(x,y,z){const id=worldData[bk(Math.round(x),Math.round(y),Math.round(z))];return id&&id!==7;}

function physicsStep(dt){
  const dir=new THREE.Vector3(-Math.sin(yaw),0,-Math.cos(yaw));
  const right=new THREE.Vector3(-Math.cos(yaw),0,Math.sin(yaw));
  const move=new THREE.Vector3();
  if(keys['KeyW']||keys['ArrowUp']) move.add(dir);
  if(keys['KeyS']||keys['ArrowDown']) move.sub(dir);
  if(keys['KeyA']||keys['ArrowLeft']) move.sub(right);
  if(keys['KeyD']||keys['ArrowRight']) move.add(right);
  if(move.length()>0) move.normalize().multiplyScalar(SPEED);
  vel.x=move.x; vel.z=move.z; vel.y+=GRAVITY*dt;
  if(keys['Space']&&onGround){vel.y=JUMP;onGround=false;}
  px+=vel.x*dt;
  if(isBlocked(px,py,pz)||isBlocked(px,py-0.9,pz)){px-=vel.x*dt;vel.x=0;}
  pz+=vel.z*dt;
  if(isBlocked(px,py,pz)||isBlocked(px,py-0.9,pz)){pz-=vel.z*dt;vel.z=0;}
  py+=vel.y*dt; onGround=false;
  if(vel.y<0&&isBlocked(px,py-PH,pz)){py=Math.round(py-PH)+PH+0.01;vel.y=0;onGround=true;}
  if(vel.y>0&&isBlocked(px,py,pz)){vel.y=0;}
  camera.position.set(px,py,pz);
  camera.rotation.order='YXZ'; camera.rotation.y=yaw; camera.rotation.x=pitch;
  document.getElementById('pos-info').textContent=`X:${Math.round(px)} Y:${Math.round(py)} Z:${Math.round(pz)}`;
}

// Multiplayer
let uid='',displayName='',presenceRef;
const others={};
const PSYNC=200; let lastSync=0;

function initMultiplayer(){
  presenceRef=ref(db,`voxelcraft/players/${uid}`);
  set(presenceRef,{name:displayName,x:px,y:py,z:pz,yaw:0,ts:serverTimestamp()});
  onDisconnect(presenceRef).remove();
  onValue(ref(db,'voxelcraft/players'),snap=>{
    const data=snap.val()||{};
    Object.keys(others).forEach(id=>{if(!data[id]||id===uid){if(others[id])scene.remove(others[id].mesh);delete others[id];}});
    Object.entries(data).forEach(([id,p])=>{
      if(id===uid) return;
      if(!others[id]){
        const g=new THREE.Group();
        const body=new THREE.Mesh(new THREE.BoxGeometry(0.6,0.9,0.3),new THREE.MeshLambertMaterial({color:0x3498db}));
        g.add(body);
        const head=new THREE.Mesh(new THREE.BoxGeometry(0.5,0.5,0.5),new THREE.MeshLambertMaterial({color:0xf1c40f}));
        head.position.y=0.7; g.add(head);
        [-0.15,0.15].forEach(ox=>{const leg=new THREE.Mesh(new THREE.BoxGeometry(0.25,0.7,0.25),new THREE.MeshLambertMaterial({color:0x2c3e50}));leg.position.set(ox,-0.8,0);g.add(leg);});
        g.position.set(p.x||0,(p.y||20)-0.9,p.z||0);
        scene.add(g); others[id]={mesh:g,name:p.name};
      } else {
        others[id].mesh.position.set(p.x||0,(p.y||20)-0.9,p.z||0);
        others[id].mesh.rotation.y=p.yaw||0;
      }
    });
    const names=Object.values(data).map(p=>`• ${p.name||'Mehmon'}`).join('<br>');
    document.getElementById('player-names').innerHTML=names||'<span style="color:#aaa">Hech kim yo\'q</span>';
  });
}

function syncPos(){
  if(!presenceRef) return;
  set(presenceRef,{name:displayName,x:+px.toFixed(2),y:+py.toFixed(2),z:+pz.toFixed(2),yaw:+yaw.toFixed(3),ts:serverTimestamp()});
}

// Chat
function openChat(){chatOpen=true;const ci=document.getElementById('chat-input');ci.style.display='block';ci.focus();document.exitPointerLock();}
function closeChat(){chatOpen=false;const ci=document.getElementById('chat-input');ci.style.display='none';ci.value='';}
function sendChat(){const msg=document.getElementById('chat-input').value.trim();if(!msg){closeChat();return;}push(ref(db,'voxelcraft/chat'),{name:displayName,msg,ts:Date.now()});closeChat();}
onValue(ref(db,'voxelcraft/chat'),snap=>{
  const data=snap.val()||{};
  const msgs=Object.values(data).sort((a,b)=>a.ts-b.ts).slice(-30);
  const el=document.getElementById('chat-messages');
  el.innerHTML=msgs.map(m=>`<p><b style="color:#5dfc5d">${m.name}:</b> ${m.msg}</p>`).join('');
  el.scrollTop=el.scrollHeight;
});

// Pause
function togglePause(){paused=!paused;document.getElementById('pause').style.display=paused?'flex':'none';if(!paused)canvas.requestPointerLock();}
document.getElementById('resumeBtn').onclick=()=>{paused=false;document.getElementById('pause').style.display='none';canvas.requestPointerLock();};

// World load
function setLoad(pct,msg){document.getElementById('loading-bar').style.width=pct+'%';document.getElementById('loading-text').textContent=msg;}

function loadWorld(cb){
  setLoad(40,'Firebase dunyo yuklanmoqda...');
  get(ref(db,'voxelcraft/world')).then(snap=>{
    const data=snap.val();
    if(data&&Object.keys(data).length>100){
      setLoad(70,'Bloklar joylashtirilmoqda...');
      Object.entries(data).forEach(([k,id])=>{const [x,y,z]=k.split(',').map(Number);addBlock(x,y,z,id);});
      setLoad(100,'Tayyor!'); setTimeout(cb,300);
    } else {
      setLoad(60,'Yangi dunyo yaratilmoqda...');
      generateWorld();
      setLoad(85,'Saqlanmoqda...');
      const wo={};Object.entries(worldData).forEach(([k,id])=>wo[k]=id);
      set(ref(db,'voxelcraft/world'),wo).then(()=>{setLoad(100,'Tayyor!');setTimeout(cb,300);}).catch(()=>{setLoad(100,'Offline');setTimeout(cb,300);});
    }
  }).catch(()=>{generateWorld();setLoad(100,'Offline rejim');setTimeout(cb,300);});
}

function watchWorld(){
  onValue(ref(db,'voxelcraft/world'),snap=>{
    const data=snap.val()||{};
    Object.keys(worldData).forEach(k=>{if(!data[k]){const[x,y,z]=k.split(',').map(Number);removeBlock(x,y,z,false);}});
    Object.entries(data).forEach(([k,id])=>{if(!worldData[k]){const[x,y,z]=k.split(',').map(Number);addBlock(x,y,z,id,false);}});
  });
}

// Game loop
const clock=new THREE.Clock();
let lastFps=0,fc=0,fps=0;
function gameLoop(){
  requestAnimationFrame(gameLoop);
  if(!gameActive||paused) return;
  const dt=Math.min(clock.getDelta(),0.05);
  physicsStep(dt);
  const now=Date.now();
  if(now-lastSync>PSYNC){syncPos();lastSync=now;}
  fc++;
  if(now-lastFps>1000){fps=fc;fc=0;lastFps=now;document.getElementById('fps-info').textContent='FPS:'+fps;}
  renderer.render(scene,camera);
}

function startGame(u,name){
  uid=u; displayName=name;
  document.getElementById('overlay').style.display='none';
  document.getElementById('loading').style.display='flex';
  setLoad(10,'Ulanmoqda...');
  loadWorld(()=>{
    document.getElementById('loading').style.display='none';
    initMultiplayer(); watchWorld();
    gameActive=true; clock.start(); gameLoop();
    setTimeout(()=>canvas.requestPointerLock(),300);
  });
}

document.getElementById('googleBtn').onclick=()=>{
  signInWithPopup(auth,gprov).then(r=>startGame(r.user.uid,r.user.displayName||'Player')).catch(e=>alert('Xato: '+e.message));
};
document.getElementById('guestBtn').onclick=()=>{
  signInAnonymously(auth).then(r=>startGame(r.user.uid,'Mehmon_'+Math.floor(Math.random()*9000+1000)));
};
onAuthStateChanged(auth,user=>{
  if(user) document.getElementById('nameDisplay').textContent='Salom, '+(user.displayName||'O\'yinchi')+'!';
});

window.addEventListener('resize',()=>{renderer.setSize(innerWidth,innerHeight);camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();});
</script>
</body>
</html>
